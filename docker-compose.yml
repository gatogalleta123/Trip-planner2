version: ‘3.8’

services:

    postgres:
      image: postgres:latest
      container_name: postgres-rdbms
      ports:
        - "5433:5432"
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: "123"
        POSTGRES_DB: tripplanner
      volumes:
        - ./init-multi-db:/docker-entrypoint-initdb.d
      networks:
        - tripplanner-network
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 20
        start_period: 10s


    kafka:
      image: confluentinc/cp-kafka:latest
      container_name: kafka-broker
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
        KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-broker:29092,EXTERNAL://localhost:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      networks:
        - tripplanner-network
      healthcheck:
        test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
        interval: 10s
        timeout: 10s
        retries: 15
        start_period: 30s

    kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: kafka-ui
      depends_on:
        kafka:
          condition: service_healthy
      ports:
        - "8080:8080"
      environment:
        KAFKA_CLUSTERS_0_NAME: local
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:29092
      networks:
        - tripplanner-network

    eureka-server:
      build: ./eureka
      image: tripplanner-eureka-server
      container_name: eureka-server
      ports:
        - "8761:8761"
      environment:
        SPRING_PROFILES_ACTIVE: prod
      networks:
        - tripplanner-network
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 20
        start_period: 40s



    api-gateway:
      build: ./api-gateway
      image: tripplanner-api-gateway
      container_name: api-gateway
      ports:
        - "9000:9000"
      depends_on:
        eureka-server:
          condition: service_healthy
      environment:
        SPRING_PROFILES_ACTIVE: prod
        EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      networks:
        - tripplanner-network
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://localhost:9000/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 20
        start_period: 40s

    ms-auth:
      build: ./ms-auth
      image: tripplanner-ms-auth
      container_name: ms-auth
      depends_on:
        eureka-server:
          condition: service_healthy
        postgres:
          condition: service_healthy
        api-gateway:
          condition: service_healthy
      environment:
        SPRING_PROFILES_ACTIVE: prod
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-rdbms:5432/auth
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: "123"
        EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
        EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      networks:
        - tripplanner-network

