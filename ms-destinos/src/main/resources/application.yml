#**GATEWAY: DEJAMOS EL PUERTO EN 0 
server:
  port: 0
  error:
    include-stacktrace: never

spring:
  application:
    name: ms-destinos

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/destinos
    username: postgres
    password: 123

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
  
    properties:
      hibernate:
        format_sql: true

    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

#***** JWT *****
#Contraseña desencriptada: "tokenSecretKeyTurismo2026TripplannerSecurity"
jwt:
  secret: "dG9rZW5TZWNyZXRLZXlUdXJpc21vMjAyNlRyaXBwbGFubmVyU2VjdXJpdHk="
  expiration-ms: 3600000
  
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"

    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 60

