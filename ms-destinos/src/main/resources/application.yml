#**GATEWAY: DEJAMOS EL PUERTO EN 0 
server:
  port: 0
  error:
    include-stacktrace: never

spring:
  application:
    name: ms-destinos

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/destinos
    username: postgres
    password: 123

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
  
    properties:
      hibernate:
        format_sql: true

    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

#***** JWT *****
#Contraseña desencriptada: "tokenSecretKeyTurismo2026TripplannerSecurity"
jwt:
  secret: "dG9rZW5TZWNyZXRLZXlUdXJpc21vMjAyNlRyaXBwbGFubmVyU2VjdXJpdHk="
  expiration-ms: 3600000
  
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"

    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 60

#Codigo desarrolllo dev
management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    description: "Microservicio de gestión de usuarios"

# ════════════════════════════════════════════════════════════
# PERFIL: Desarrollo
# ════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# MOVIDO AQUÍ PARA ASEGURAR QUE SE ACTIVE EN DEV
logging:
  level:
    root: INFO
    cl.tripplanner: DEBUG                   # <--- Esto activa TODO tu código
    org.springframework.kafka: INFO
    org.apache.kafka.clients: WARN
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers

# ════════════════════════════════════════════════════════════
# PERFIL: Producción
# ════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    cl.tripplanner: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka}
      #bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

