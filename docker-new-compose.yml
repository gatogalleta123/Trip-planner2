version: '3.8'

services:
  # --- INFRAESTRUCTURA BASE ---
  postgres:
    image: postgres:latest
    container_name: postgres-rdbms # Cambiado a guion medio para evitar errores DNS en Java [4]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: trip-planner
    healthcheck: # Vital para que los MS esperen a que la DB esté lista [5]
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-multi-db:/docker-entrypoint-initdb.d

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-broker:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck: # Valida que el broker esté operativo [5]
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:29092

  # --- SERVICIOS DE SISTEMA ---
  eureka-server:
    build: ./eureka # Busca el Dockerfile en la carpeta eureka [6]
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9000:9000"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka

  # --- MICROSERVICIOS DE NEGOCIO (Ejemplos principales) ---
  # Repite este bloque para tus 10 microservicios
  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod # Usa variables de entorno para producción [7, 8]
      - DB_URL=jdbc:postgresql://postgres-rdbms:5432/auth
      - DB_USERNAME=postgres
      - DB_PASSWORD=123
      - EUREKA_URL=http://eureka-server:8761/eureka

  ms-usuarios:
    build: ./ms-usuarios
    container_name: ms-usuarios
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://postgres-rdbms:5432/usuarios
      - DB_USERNAME=postgres
      - DB_PASSWORD=123
      - EUREKA_URL=http://eureka-server:8761/eureka